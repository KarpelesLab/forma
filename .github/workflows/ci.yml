name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  msrv:
    name: MSRV 1.86 (library crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.86
      - uses: Swatinem/rust-cache@v2
      # The library crates guarantee rust 1.86. The examples pull oxideav-png →
      # compcol (rust-version 1.88), so the MSRV-aware resolver would refuse to
      # resolve the workspace on 1.86. `incompatible-rust-versions=allow` lets it
      # resolve anyway; the selected library crates are still compiled on 1.86
      # (compcol isn't among their deps), so a real incompatibility would still
      # surface as a compile error.
      - name: cargo check (libs only)
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
        run: >
          cargo check
          -p forma-geometry -p forma-render -p forma-platform
          -p forma-layout -p forma-core -p forma-anim
          -p forma-style -p forma-widgets -p forma
