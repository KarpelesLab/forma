name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  msrv:
    name: MSRV 1.86 (library crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86
      - uses: Swatinem/rust-cache@v2
      # The library crates guarantee rust 1.86. The gallery example is excluded:
      # it depends on oxideav-png, whose transitive deps require a newer
      # toolchain. Example/dev dependencies are not bound by the library MSRV.
      - name: cargo check (libs only)
        run: >
          cargo check
          -p forma-geometry -p forma-render -p forma-platform
          -p forma-layout -p forma-core -p forma-anim
          -p forma-style -p forma-widgets -p forma
