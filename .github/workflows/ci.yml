name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  msrv:
    name: MSRV 1.86 (library crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.86
      - uses: Swatinem/rust-cache@v2
      # The library crates guarantee rust 1.86. `--ignore-rust-version` skips
      # the resolver's rust-version *gate* (the examples pull oxideav-png →
      # compcol, which declares a newer rust-version) — but the selected library
      # crates are still actually compiled with 1.86, so a real incompatibility
      # would still surface as a compile error.
      - name: cargo check (libs only)
        run: >
          cargo check --ignore-rust-version
          -p forma-geometry -p forma-render -p forma-platform
          -p forma-layout -p forma-core -p forma-anim
          -p forma-style -p forma-widgets -p forma
