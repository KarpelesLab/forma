<!doctype html>
<!--
  Standalone WebGPU triangle — the browser GPU backend for Forma's "GPU-native
  drawing" track. No wgpu/bindgen: hand-written WGSL + the WebGPU JS API (the one
  sanctioned web exception in ROADMAP.md §1). Renders a forma-green triangle on a
  dark clear into an *offscreen* texture, copies it back to the CPU, and prints
  the center pixel via console.log — so CI checks the actual rendered pixel
  deterministically (no flaky canvas-composite-vs-screenshot timing). The frame
  is also blitted to a canvas as a human-viewable artifact.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>forma webgpu</title>
    <style>
      html, body { margin: 0; padding: 0; background: #141518; }
      #c { display: block; }
    </style>
  </head>
  <body>
    <canvas id="c" width="420" height="300"></canvas>
    <script>
      const W = 420, H = 300;

      function fail(msg) {
        document.body.style.background = "red";
        document.title = "WEBGPU_FAIL " + msg;
        console.log("WEBGPU_FAIL " + msg);
      }

      async function main() {
        if (!navigator.gpu) return fail("navigator.gpu missing");
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) return fail("no adapter");
        const device = await adapter.requestDevice();

        const format = "rgba8unorm";
        const target = device.createTexture({
          size: [W, H],
          format,
          usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.COPY_SRC,
        });

        const shader = device.createShaderModule({
          code: `
            @vertex fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
              var p = array<vec2f, 3>(vec2f(0.0, 0.6), vec2f(0.6, -0.6), vec2f(-0.6, -0.6));
              return vec4f(p[i], 0.0, 1.0);
            }
            @fragment fn fs() -> @location(0) vec4f {
              return vec4f(52.0 / 255.0, 211.0 / 255.0, 153.0 / 255.0, 1.0);
            }
          `,
        });
        const pipeline = device.createRenderPipeline({
          layout: "auto",
          vertex: { module: shader, entryPoint: "vs" },
          fragment: { module: shader, entryPoint: "fs", targets: [{ format }] },
          primitive: { topology: "triangle-list" },
        });

        // bytesPerRow must be a multiple of 256 for copyTextureToBuffer.
        const bytesPerRow = Math.ceil((W * 4) / 256) * 256;
        const readback = device.createBuffer({
          size: bytesPerRow * H,
          usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ,
        });

        const encoder = device.createCommandEncoder();
        const pass = encoder.beginRenderPass({
          colorAttachments: [
            {
              view: target.createView(),
              clearValue: { r: 0x14 / 255, g: 0x15 / 255, b: 0x18 / 255, a: 1 },
              loadOp: "clear",
              storeOp: "store",
            },
          ],
        });
        pass.setPipeline(pipeline);
        pass.draw(3);
        pass.end();
        encoder.copyTextureToBuffer({ texture: target }, { buffer: readback, bytesPerRow }, [W, H, 1]);
        device.queue.submit([encoder.finish()]);

        await readback.mapAsync(GPUMapMode.READ);
        const data = new Uint8Array(readback.getMappedRange());
        const i = (H >> 1) * bytesPerRow + (W >> 1) * 4;
        const px = `${data[i]},${data[i + 1]},${data[i + 2]}`;
        console.log("WEBGPU center=" + px);
        document.title = "WEBGPU center=" + px;

        // Blit to the canvas as a viewable artifact (best-effort).
        try {
          const ctx = document.getElementById("c").getContext("2d");
          const img = ctx.createImageData(W, H);
          for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
              const s = y * bytesPerRow + x * 4;
              const d = (y * W + x) * 4;
              img.data[d] = data[s];
              img.data[d + 1] = data[s + 1];
              img.data[d + 2] = data[s + 2];
              img.data[d + 3] = 255;
            }
          }
          ctx.putImageData(img, 0, 0);
        } catch (e) {}
        readback.unmap();
      }

      main().catch((e) => fail(String(e)));
    </script>
  </body>
</html>
